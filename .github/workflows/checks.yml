name: Checks

on:
  pull_request:
  push:
    branches: [master]

# Reusable workflows can only restrict permissions, not elevate them — so the
# caller has to grant `statuses: write` for the coverage-monitor commit status
# to post.
permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  checks:
    uses: kaisekidev/.github/.github/workflows/checks.yml@v1
